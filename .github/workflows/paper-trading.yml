name: Daily Paper Trading Update

on:
  schedule:
    # Run at 21:30 UTC (5:30 PM EST) Monday-Friday, well after market close
    - cron: '30 21 * * 1-5'
  workflow_dispatch: # Allow manual trigger from GitHub UI

jobs:
  update-dashboard:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install yfinance pandas numpy

      - name: Run Paper Trading Engine
        run: |
          python update.py

      - name: Commit and Push changes
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add dashboard/data/
          # Only commit if there are changes
          git diff --quiet && git diff --staged --quiet || (git commit -m "Automated daily update $(date +'%Y-%m-%d')" && git push)
